<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Las Vegas Mahjong — Feedback QR Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#e0e0e0;
    font-family:"DM Sans",sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
    padding:30px;
  }

  .controls { text-align:center; }
  .controls p { font-size:12px; color:#888; margin-bottom:10px; }
  .print-btn {
    background:#1a1b6e; color:white; border:none;
    padding:10px 28px; border-radius:6px;
    font-family:"DM Sans",sans-serif; font-size:13px;
    font-weight:700; cursor:pointer; letter-spacing:0.05em;
  }

  /* Single card — half letter size, easy to hold */
  .card {
    width: 5in;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Navy header */
  .card-header {
    width: 100%;
    background: #1a1b6e;
    padding: 22px 24px 18px;
    text-align: center;
  }
  .brand {
    font-family:"Playfair Display",serif;
    font-size:22px; font-weight:900;
    color:white; line-height:1.1;
  }
  .brand em { color:#e91e8c; font-style:italic; }
  .brand-sub {
    font-size:9px; font-weight:700;
    letter-spacing:0.22em; text-transform:uppercase;
    color:rgba(255,255,255,0.4); margin-top:4px;
  }

  /* Pink+navy gradient line */
  .divider {
    width:100%; height:4px;
    background:linear-gradient(90deg,#1a1b6e,#e91e8c,#1a1b6e);
    flex-shrink:0;
  }

  /* Body */
  .card-body {
    width:100%;
    padding:28px 32px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    text-align:center;
  }

  .headline {
    font-family:"Playfair Display",serif;
    font-size:18px; font-weight:700;
    color:#1a1b6e; line-height:1.25;
  }

  .sub {
    font-size:11px; color:#6b7280;
    line-height:1.6; max-width:320px;
  }

  .qr-wrap {
    background:white;
    border:2px solid #e8eaf0;
    border-radius:12px;
    padding:12px;
    box-shadow:0 4px 16px rgba(26,27,110,0.08);
  }
  .qr-wrap img { width:180px; height:180px; display:block; }

  .scan-label {
    font-size:9px; font-weight:700;
    letter-spacing:0.18em; text-transform:uppercase;
    color:#e91e8c;
  }

  /* Footer */
  .card-footer {
    width:100%;
    background:#f4f6ff;
    border-top:1px solid #e8eaf0;
    padding:10px 16px;
    font-size:9px;
    color:#9ca3af;
    text-align:center;
    letter-spacing:0.06em;
  }
  .card-footer span { color:#e91e8c; font-weight:700; }

  @media print {
    body { background:white; padding:0; justify-content:flex-start; padding-top:1in; }
    .controls { display:none; }
    .card { box-shadow:none; border:1px solid #ddd; }
    @page { size:8.5in 11in portrait; margin:0; }
  }
</style>
</head>
<body>

<div class="controls">
  <p>Open in Chrome · Print or display on table for guests to scan</p>
  <button class="print-btn" onclick="window.print()">🖨&nbsp; Print</button>
</div>

<div class="card">
  <div class="card-header">
    <div class="brand">Las Vegas <em>Mahjong</em></div>
    <div class="brand-sub">lasvegasmahj.com</div>
  </div>
  <div class="divider"></div>
  <div class="card-body">
    <div class="headline">How was tonight? 🀄<br>We'd love your feedback!</div>
    <div class="sub">Scan the QR code with your phone camera — takes less than 2 minutes!</div>
    <div class="qr-wrap">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&color=1a1b6e&bgcolor=ffffff&data=https%3A%2F%2Fdocs.google.com%2Fforms%2Fd%2Fe%2F1FAIpQLSetW5ypbyN8_n2A2XmI7BOF94Az44E501sjE2tZAgQIIUu5Ww%2Fviewform%3Fusp%3Dheader&qzone=1" alt="Feedback QR Code"/>
    </div>
    <div class="scan-label">↑ Point your camera here</div>
  </div>
  <div class="card-footer">
    Thank you for joining us tonight! &nbsp;·&nbsp; <span>@lasvegasmahjong</span>
  </div>
</div>

</body>
</html>
